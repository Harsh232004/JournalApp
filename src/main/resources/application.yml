spring:
  profiles:
    active: dev

  application:
    name: auction-spring-rest-api

  datasource:
    url: ${DB_URL}
    username: root
    password: ${DB_PASSWORD}

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true

  jackson:
    default-property-inclusion: NON_NULL
    serialization:
      write-dates-as-timestamps: false

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  data:
    redis:
      host: ${REDIS_HOST}
      port: 18953
      password: ${REDIS_PASSWORD}
      ssl:
        enabled: false

server:
  port: 8080
  servlet:
    context-path: /
  error:
    include-message: always

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
  level:
    com.auction.springrestapi: INFO
    org.mockito: ERROR
    java.instrument: OFF
    net.bytebuddy: ERROR
    jdk.internal.agent: OFF
    org.springframework.data.redis: DEBUG

weather:
  api:
    key: ${WEATHER_API_KEY}
